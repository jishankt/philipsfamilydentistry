{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dr.Philips Family Dentistry</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --primary:#0d6efd;
    --light-bg:#f7fbff;
}

/* GLOBAL */
body{
    font-family:'Poppins',sans-serif;
    background:var(--light-bg);
    overflow-x:hidden;
}

/* ================= NAVBAR ================= */
.navbar{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(12px);
    box-shadow:0 4px 20px rgba(0,0,0,0.06);
    padding:14px 0;
}

.navbar-brand{
    font-weight:700;
    color:var(--primary)!important;
    font-size:22px;
}

.nav-link{
    font-weight:500;
    margin-right:12px;
    transition:.3s;
}

.nav-link:hover{
    color:var(--primary)!important;
}

/* BUTTON */
.btn-primary{
    background:linear-gradient(135deg,#0d6efd,#4da3ff);
    border:none;
    border-radius:40px;
    padding:10px 26px;
    font-weight:500;
    transition:.3s;
}

.btn-primary:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(13,110,253,0.3);
}

/* ================= FOOTER ================= */
footer{
    background:linear-gradient(135deg,#0d6efd,#4da3ff);
    color:white;
    padding:50px 0;
    margin-top:80px;
}

footer p{
    opacity:.9;
}

/* MOBILE */
@media(max-width:768px){

.navbar-brand{
    font-size:18px;
}

}

</style>

</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">

<a class="navbar-brand" href="/">
🦷 Dr.Philips Dentistry
</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav ms-auto align-items-lg-center">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/about/">Doctor</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/services/">Services</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/gallery/">Gallery</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/contact/">Contact</a>
</li>

<li class="nav-item ms-lg-3">
<a href="/appointment/" class="btn btn-primary">
Book Appointment
</a>
</li>

</ul>

</div>
</div>
</nav>


<!-- ================= PAGE CONTENT ================= -->
{% block content %}
{% endblock %}


<!-- ================= FOOTER ================= -->
<footer>
<div class="container text-center">

<h5>Dr.Philips Family Dentistry</h5>
<p>Modern Dental Care with Advanced Technology</p>

<p>📞 97446 68856</p>

<p class="mb-0">
© 2026 All Rights Reserved
</p>

</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
