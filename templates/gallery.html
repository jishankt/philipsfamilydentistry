{% extends 'base.html' %}
{% load static %}
{% block content %}

<!-- ================= HERO ================= -->
<section class="gallery-hero">

<div class="container text-center">

<h1 class="hero-title">Clinic Gallery</h1>

<p class="hero-subtitle">
A glimpse of our modern dental clinic & treatments
</p>

</div>

</section>



<!-- ================= GALLERY ================= -->
<section class="gallery-section">

<div class="container">

<div class="row g-4">

{% for img in images %}
<div class="col-lg-4 col-md-6 col-12">

<div class="gallery-card">

<div class="image-wrapper">

<img src="{{ img.image.url }}"
class="gallery-img"
onclick="openImage('{{ img.image.url }}')">

<div class="overlay">
<h6>{{ img.title }}</h6>
</div>

</div>

</div>

</div>
{% endfor %}

</div>

</div>

</section>



<!-- ================= LIGHTBOX ================= -->
<div id="lightbox" class="lightbox">

<span class="close-btn">&times;</span>

<img id="lightbox-img">

</div>



<!-- ================= FLOAT WHATSAPP ================= -->
<a href="https://wa.me/919744668856"
target="_blank"
class="whatsapp-float">

<i class="bi bi-whatsapp"></i>

</a>



<!-- ================= PREMIUM STYLE ================= -->
<style>

/* HERO */
.gallery-hero{
    padding:90px 0;
    background:linear-gradient(135deg,#0d6efd,#4da3ff);
    color:white;
}

.hero-title{
    font-size:42px;
    font-weight:700;
}

.hero-subtitle{
    opacity:.9;
}


/* SECTION */
.gallery-section{
    padding:100px 0;
    background:linear-gradient(135deg,#f4f9ff,#ffffff);
}


/* CARD */
.gallery-card{
    border-radius:20px;
    overflow:hidden;
    background:white;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    transition:.4s;
}

.gallery-card:hover{
    transform:translateY(-8px);
}


/* IMAGE */
.image-wrapper{
    position:relative;
    overflow:hidden;
}

.gallery-img{
    width:100%;
    height:260px;
    object-fit:cover;
    cursor:pointer;
    transition:.5s;
}

.gallery-card:hover .gallery-img{
    transform:scale(1.1);
}


/* OVERLAY */
.overlay{
    position:absolute;
    bottom:0;
    width:100%;
    padding:18px;
    background:linear-gradient(transparent, rgba(0,0,0,0.8));
    color:white;
    text-align:center;
    opacity:0;
    transition:.4s;
}

.gallery-card:hover .overlay{
    opacity:1;
}


/* LIGHTBOX */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:9999;
    animation:fadeIn .3s ease;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.close-btn{
    position:absolute;
    top:25px;
    right:35px;
    font-size:40px;
    color:white;
    cursor:pointer;
}


/* WHATSAPP */
.whatsapp-float{
    position:fixed;
    bottom:25px;
    right:25px;
    width:65px;
    height:65px;
    background:linear-gradient(135deg,#25D366,#1ebe5d);
    color:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    z-index:999;
    transition:.3s;
}

.whatsapp-float:hover{
    transform:scale(1.1);
}


/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}


/* MOBILE */
@media(max-width:768px){

.hero-title{
    font-size:28px;
}

.gallery-img{
    height:220px;
}

}

</style>



<!-- ================= LIGHTBOX SCRIPT ================= -->
<script>

function openImage(src){
    const lightbox = document.getElementById("lightbox");
    const img = document.getElementById("lightbox-img");

    img.src = src;
    lightbox.style.display = "flex";
}

document.querySelector(".close-btn").onclick = function(){
    document.getElementById("lightbox").style.display = "none";
};

document.getElementById("lightbox").onclick = function(e){
    if(e.target.id === "lightbox"){
        this.style.display = "none";
    }
};

</script>

{% endblock %}
